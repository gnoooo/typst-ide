name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-22.04
            artifact: "*.AppImage"
            artifact_dir: "bundle/appimage"

          - target: x86_64-pc-windows-gnu
            os: ubuntu-22.04
            artifact: "*.exe"
            artifact_dir: "bundle/nsis"

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # System deps (Linux) 
      - name: Install Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            libgl1-mesa-dri \
            libgl1-mesa-dev \
            libglu1-mesa \
            libegl1

      # MinGW cross-compiler + NSIS (for Windows target, built on Linux) 
      - name: Install MinGW + NSIS (Windows cross-compile)
        if: matrix.target == 'x86_64-pc-windows-gnu'
        run: sudo apt-get install -y gcc-mingw-w64-x86-64 binutils-mingw-w64-x86-64 nsis

      # Rust 
      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"

      # Node.js / npm 
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm install

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      # Tauri build 
      - name: Install Tauri CLI
        run: cargo install tauri-cli --locked

      - name: Set version from tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "Building version $VERSION"
          jq ".version = \"$VERSION\"" crates/app/tauri.conf.json > /tmp/tauri.conf.json
          mv /tmp/tauri.conf.json crates/app/tauri.conf.json

      - name: Build app (Linux AppImage)
        if: matrix.target == 'x86_64-unknown-linux-gnu'
        working-directory: crates/app
        env:
          TAURI_BUNDLER_DONT_BUNDLE: >
            libwebkit2gtk-4.1.so
            libavif.so
            libEGL.so
            libGL.so
            libGLX.so
            libgbm.so
            libdrm.so
        run: NO_STRIP=1 cargo tauri build --target ${{ matrix.target }}

      - name: Build app (Windows NSIS)
        if: matrix.target == 'x86_64-pc-windows-gnu'
        working-directory: crates/app
        run: cargo tauri build --target ${{ matrix.target }}

      # Patch AppImage runtime for FUSE3 compatibility (Arch Linux, Fedora, etc.)
      - name: Replace AppImage runtime with FUSE3-compatible runtime
        if: matrix.target == 'x86_64-unknown-linux-gnu'
        run: |
          APPIMAGE=$(find target/${{ matrix.target }}/release/bundle/appimage -name "*.AppImage" | head -1)
          wget -q "https://github.com/AppImage/type2-runtime/releases/download/continuous/runtime-x86_64" -O /tmp/runtime-fuse3
          RUNTIME_SIZE=$(wc -c < /tmp/runtime-fuse3)
          dd if=/tmp/runtime-fuse3 of="$APPIMAGE" bs=1 count=$RUNTIME_SIZE conv=notrunc
          echo "Patched AppImage runtime: $APPIMAGE"

      # Upload artifacts 
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: typst-ide-${{ matrix.target }}
          path: target/${{ matrix.target }}/release/${{ matrix.artifact_dir }}/${{ matrix.artifact }}
          if-no-files-found: error

  # Create GitHub Release 
  release:
    needs: build
    runs-on: ubuntu-22.04
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true

name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-22.04
            artifact: "*.AppImage"
            artifact_dir: "bundle/appimage"

          - target: x86_64-pc-windows-gnu
            os: ubuntu-22.04
            artifact: "*.exe"
            artifact_dir: "bundle/nsis"

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # System deps (Linux)
      # WebKitGTK is pinned to 2.44.0-2: versions >= 2.46 introduced a DMABuf renderer
      # that hard-aborts with EGL_BAD_ALLOC when the AppImage runs on non-Ubuntu distros
      # (Arch, Fedora...) due to ABI mismatch between bundled Wayland libs and system Mesa.
      # See: https://github.com/tauri-apps/tauri/issues/11994
      - name: Install Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-0=2.44.0-2 \
            libwebkit2gtk-4.1-dev=2.44.0-2 \
            libjavascriptcoregtk-4.1-0=2.44.0-2 \
            libjavascriptcoregtk-4.1-dev=2.44.0-2 \
            gir1.2-javascriptcoregtk-4.1=2.44.0-2 \
            gir1.2-webkit2-4.1=2.44.0-2 \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            file

      # MinGW cross-compiler + NSIS (for Windows target, built on Linux) 
      - name: Install MinGW + NSIS (Windows cross-compile)
        if: matrix.target == 'x86_64-pc-windows-gnu'
        run: sudo apt-get install -y gcc-mingw-w64-x86-64 binutils-mingw-w64-x86-64 nsis

      # Rust 
      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"

      # Node.js / npm 
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm install

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      # Tauri build 
      - name: Install Tauri CLI
        run: cargo install tauri-cli --locked

      - name: Set version from tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "Building version $VERSION"
          jq ".version = \"$VERSION\"" crates/app/tauri.conf.json > /tmp/tauri.conf.json
          mv /tmp/tauri.conf.json crates/app/tauri.conf.json

      - name: Build app (Linux AppImage)
        if: matrix.target == 'x86_64-unknown-linux-gnu'
        working-directory: crates/app
        run: NO_STRIP=1 cargo tauri build --target ${{ matrix.target }}

      - name: Build app (Windows NSIS)
        if: matrix.target == 'x86_64-pc-windows-gnu'
        working-directory: crates/app
        run: cargo tauri build --target ${{ matrix.target }}

      # Patch AppImage: remove bundled Wayland/WPE libs + use FUSE3-compatible runtime
      # - libwayland-*.so : Ubuntu-built, ABI mismatch with system Mesa/EGL on Arch/Fedora
      # - libwpe-1.0.so / libWPEBackend-fdo-1.0.so : same issue, causes blank/unclickable window
      # Removing them forces the AppImage to use the system libs (which match system Mesa/EGL).
      # This is safe: all distros supported by Tauri v2 have these libs available.
      # See: https://github.com/tauri-apps/tauri/issues/11994
      - name: Patch AppImage for cross-distro compatibility
        if: matrix.target == 'x86_64-unknown-linux-gnu'
        run: |
          APPIMAGE=$(find target/${{ matrix.target }}/release/bundle/appimage -name "*.AppImage" | head -1)
          echo "Patching: $APPIMAGE"

          # Extract AppImage contents (no FUSE needed)
          chmod +x "$APPIMAGE"
          "$APPIMAGE" --appimage-extract

          # Remove bundled libs that conflict with system Mesa/EGL on non-Ubuntu distros
          rm -f squashfs-root/usr/lib/libwayland-*.so*
          rm -f squashfs-root/usr/lib/libwpe-1.0.so*
          rm -f squashfs-root/usr/lib/libWPEBackend-fdo-1.0.so*
          echo "Removed conflicting bundled libs"

          # Download FUSE3-compatible runtime (works on Arch, Fedora, Ubuntu...)
          wget -q "https://github.com/AppImage/type2-runtime/releases/download/continuous/runtime-x86_64" \
               -O /tmp/runtime-fuse3

          # Download appimagetool to repack
          wget -q "https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage" \
               -O /tmp/appimagetool
          chmod +x /tmp/appimagetool

          # Repack with the FUSE3 runtime
          ARCH=x86_64 /tmp/appimagetool \
            --appimage-extract-and-run \
            --runtime-file /tmp/runtime-fuse3 \
            squashfs-root/ \
            "${APPIMAGE}.patched"

          mv "${APPIMAGE}.patched" "$APPIMAGE"
          rm -rf squashfs-root
          echo "Done: $APPIMAGE"

      # Upload artifacts 
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: typst-ide-${{ matrix.target }}
          path: target/${{ matrix.target }}/release/${{ matrix.artifact_dir }}/${{ matrix.artifact }}
          if-no-files-found: error

  # Create GitHub Release 
  release:
    needs: build
    runs-on: ubuntu-22.04
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
